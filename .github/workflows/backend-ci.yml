name: Backend CI

on:
  pull_request:
    branches: [master]
    paths:
      - "backend/**"
  push:
    branches: [master]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Build & test
        run: mvn verify -B
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: football501
          DB_USER: football501
          DB_PASSWORD: football501

  # Deploy to Fly.io on merge to master
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - run: flyctl deploy --remote-only
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
