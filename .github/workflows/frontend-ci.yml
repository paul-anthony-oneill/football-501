name: Frontend CI

on:
  pull_request:
    branches: [master]
    paths:
      - "frontend-react/**"
  push:
    branches: [master]
    paths:
      - "frontend-react/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - run: npm ci
      - run: npm run build

