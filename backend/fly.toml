# fly.toml app configuration file generated for backend-rosy-cloud-4618 on 2026-06-02T11:44:36-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backend-rosy-cloud-4618'
primary_region = 'sjc'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/actuator/health"
    port = 8080
    timeout = "15s"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
