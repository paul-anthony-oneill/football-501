spring:
  datasource:
    # PostgreSQL compatibility mode lets H2 accept jsonb columns and related syntax
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

football501:
  data:
    import-path: ../data/transfermarkt
  game:
    default-turn-timer: 45
    checkout-range-min: -10
    checkout-range-max: 0
